<!DOCTYPE html>
<html>
<head>
    <title>Log Study Session</title>
</head>
<body>
    <h1>Log a Study Session</h1>

    <form method="POST">
        <label>Subject:</label><br>
        <input type="text" name="subject" placeholder="e.g. Physics" required><br><br>

        <label>Duration (minutes):</label><br>
        <input type="number" name="duration" placeholder="e.g. 60" min="1" required><br><br>

        <button type="submit">Save Session</button>
    </form>
</body>
</html>
